services:

  mysql:
    image: mysql:8.4
    command: --log-bin=mysql-bin --binlog-format=ROW --binlog-row-image=FULL --server-id=1
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: ftgo
      MYSQL_PASSWORD: ftgo
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infrastructure/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ftgo", "-pftgo"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.9.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.9.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  service-registry:
    build:
      context: .
      dockerfile: ftgo-service-registry/Dockerfile
    ports:
      - "8761:8761"

  kafka-connect:
    # 3.0.0.Final: 2.7.x issues SHOW MASTER STATUS against MySQL, which 8.4 removed
    # (renamed to SHOW BINARY LOG STATUS) — connector reports RUNNING while silently
    # delivering zero events on 2.7.x. Do not downgrade without re-verifying against mysql:8.4.
    image: debezium/connect:3.0.0.Final
    depends_on:
      kafka:
        condition: service_started
      mysql:
        condition: service_healthy
    ports:
      # 8087 host-side avoids colliding with kitchen-service's 8083:8083 mapping below;
      # container-internal port stays 8083 (used by the healthcheck and connector-registrar).
      - "8087:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect-configs
      OFFSET_STORAGE_TOPIC: connect-offsets
      STATUS_STORAGE_TOPIC: connect-status
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/"]
      interval: 10s
      timeout: 5s
      retries: 10

  connector-registrar:
    image: curlimages/curl:8.10.1
    depends_on:
      kafka-connect:
        condition: service_healthy
    volumes:
      - ./infrastructure/debezium/outbox-connector.json:/outbox-connector.json:ro
    environment:
      OUTBOX_PUBLISH_MODE: ${OUTBOX_PUBLISH_MODE:-polling}
    entrypoint:
      - sh
      - -c
      - |
        if [ "$$OUTBOX_PUBLISH_MODE" = "cdc" ]; then
          curl -s -X PUT http://kafka-connect:8083/connectors/outbox-connector/config -H "Content-Type: application/json" -d @/outbox-connector.json
        else
          curl -s -X DELETE http://kafka-connect:8083/connectors/outbox-connector || true
        fi
    restart: "no"

  restaurant-service:
    build:
      context: .
      dockerfile: ftgo-restaurant-service/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      service-registry:
        condition: service_started
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ftgo_restaurant
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://service-registry:8761/eureka/

  order-service:
    build:
      context: .
      dockerfile: ftgo-order-service/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
      service-registry:
        condition: service_started
      restaurant-service:
        condition: service_started
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ftgo_order
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://service-registry:8761/eureka/
      OUTBOX_PUBLISH_MODE: ${OUTBOX_PUBLISH_MODE:-polling}
      SAGA_MODE: ${SAGA_MODE:-choreography}

  kitchen-service:
    build:
      context: .
      dockerfile: ftgo-kitchen-service/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ftgo_kitchen
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SAGA_MODE: ${SAGA_MODE:-choreography}

  consumer-service:
    build:
      context: .
      dockerfile: ftgo-consumer-service/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ftgo_consumer
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SAGA_MODE: ${SAGA_MODE:-choreography}

  accounting-service:
    build:
      context: .
      dockerfile: ftgo-accounting-service/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ftgo_accounting
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SAGA_MODE: ${SAGA_MODE:-choreography}

volumes:
  mysql-data:
